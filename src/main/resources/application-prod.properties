spring.application.name=backend-api-expense-springboot

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# Jackson JSON serialization (snake_case to match frontend)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Database (PostgreSQL via JPA)
# Prefer the Supabase session pooler on Render or other IPv4-only hosts.
spring.datasource.url=${DATABASE_JDBC_URL:${SUPABASE_POOLER_JDBC_URL:${SUPABASE_POOLER_URL:${DATABASE_URL:}}}}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.connectTimeout=10
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.datasource.hikari.data-source-properties.ApplicationName=expense-tracker-prod

# Firebase Admin SDK (no API keys in backend)
firebase.enabled=true
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# OpenRouter (replaces Gemini)
openrouter.api-key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:arcee-ai/trinity-large-preview:free}
openrouter.base-url=https://openrouter.ai/api/v1
openrouter.timeout=20

# Rate limiting (strict for production)
app.rate-limit.max-requests-per-minute=60

# CORS (restricted for production)
app.cors.allowed-origins=${CORS_ALLOW_ORIGINS:https://expensevault-ruddy.vercel.app}
app.auth.access-cookie-name=${APP_AUTH_ACCESS_COOKIE_NAME:access_token}
app.auth.cookie-path=${APP_AUTH_COOKIE_PATH:/}
app.auth.cookie-secure=true
app.auth.same-site=${APP_AUTH_SAME_SITE:Lax}
app.auth.fallback-max-age-seconds=${APP_AUTH_FALLBACK_MAX_AGE_SECONDS:3600}

# Logging (minimal in production)
logging.level.root=WARN
logging.level.com.wing.backendapiexpensespringboot=INFO
logging.level.org.springframework.web=WARN

# Spring Boot Actuator (restricted)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Realtime relay
realtime.relay-url=${REALTIME_RELAY_URL:}
realtime.public-socket-url=${REALTIME_PUBLIC_SOCKET_URL:}
realtime.relay-secret=${REALTIME_RELAY_SECRET:}
realtime.token-ttl-seconds=${REALTIME_TOKEN_TTL_SECONDS:3600}
