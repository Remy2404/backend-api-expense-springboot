spring.application.name=backend-api-expense-springboot

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# Jackson JSON serialization (snake_case to match frontend)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Database (PostgreSQL via JPA)
spring.datasource.url=${DATABASE_JDBC_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:60000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:600000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME_MS:300000}
spring.datasource.hikari.initialization-fail-timeout=5000
spring.main.lazy-initialization=true
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.data-source-properties.connectTimeout=10
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.datasource.hikari.data-source-properties.ApplicationName=expense-tracker-prod

# Firebase Admin SDK (no API keys in backend)
firebase.enabled=true
firebase.project-id=${FIREBASE_PROJECT_ID}
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# OpenRouter (replaces Gemini)
openrouter.api-key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
openrouter.fallback-models=${OPENROUTER_FALLBACK_MODELS:openai/gpt-oss-120b:free,google/gemma-4-31b-it:free}
openrouter.base-url=https://openrouter.ai/api/v1
openrouter.timeout=20

# Rate limiting (strict for production)
app.rate-limit.max-requests-per-minute=60

# CORS (restricted for production)
app.cors.allowed-origins=${CORS_ALLOW_ORIGINS:https://expensevault-ruddy.vercel.app}
app.auth.access-cookie-name=access_token
app.auth.cookie-path=/
app.auth.cookie-secure=true
app.auth.same-site=None
app.auth.session-max-age-seconds=432000
app.auth.fallback-max-age-seconds=3600
app.bootstrap.default-categories-enabled=${APP_BOOTSTRAP_DEFAULT_CATEGORIES_ENABLED:true}
app.bootstrap.async.core-pool-size=${APP_BOOTSTRAP_ASYNC_CORE_POOL_SIZE:1}
app.bootstrap.async.max-pool-size=${APP_BOOTSTRAP_ASYNC_MAX_POOL_SIZE:1}
app.bootstrap.async.queue-capacity=${APP_BOOTSTRAP_ASYNC_QUEUE_CAPACITY:50}
app.database-retry.max-attempts=${APP_DB_RETRY_MAX_ATTEMPTS:2}
app.database-retry.initial-backoff-ms=${APP_DB_RETRY_INITIAL_BACKOFF_MS:250}
app.database-retry.max-backoff-ms=${APP_DB_RETRY_MAX_BACKOFF_MS:1000}
app.database-retry.multiplier=${APP_DB_RETRY_MULTIPLIER:2.0}

# Logging (minimal in production)
logging.level.root=WARN
logging.level.com.wing.backendapiexpensespringboot=INFO
logging.level.org.springframework.web=WARN

# Spring Boot Actuator (restricted)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Realtime relay
realtime.relay-url=${REALTIME_RELAY_URL:}
realtime.public-socket-url=${REALTIME_PUBLIC_SOCKET_URL:}
realtime.relay-secret=${REALTIME_RELAY_SECRET:}
realtime.token-ttl-seconds=${REALTIME_TOKEN_TTL_SECONDS:3600}

# ImageKit media upload
imagekit.enabled=${IMAGEKIT_ENABLED:true}
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY}
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT}
imagekit.receipt-folder=${IMAGEKIT_RECEIPT_FOLDER:/receipts}
imagekit.max-file-size-bytes=${IMAGEKIT_MAX_FILE_SIZE_BYTES:10485760}
imagekit.allowed-mime-types=${IMAGEKIT_ALLOWED_MIME_TYPES:image/jpeg,image/png,image/webp,image/heic}
imagekit.upload-token-ttl-seconds=${IMAGEKIT_UPLOAD_TOKEN_TTL_SECONDS:900}
imagekit.signed-url-ttl-seconds=${IMAGEKIT_SIGNED_URL_TTL_SECONDS:900}
imagekit.private-file=${IMAGEKIT_PRIVATE_FILE:true}
imagekit.use-unique-file-name=${IMAGEKIT_USE_UNIQUE_FILE_NAME:true}
